name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Testes unitários e de integração (Jest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Testes de usuário (Cypress)
        run: npm run test:e2e --workspace=@portfolio/web
